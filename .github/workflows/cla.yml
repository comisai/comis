name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        # Only run when a contributor signs, rechecks, or a PR event fires
        if: |
          github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA' ||
          github.event.comment.body == 'recheck' ||
          github.event_name == 'pull_request_target'
        # Pinned to a specific commit SHA to prevent supply-chain attacks
        uses: contributor-assistant/github-action@58daaf842ac3e26d08c2bdf26770d6e9c5b965a9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Fine-grained PAT scoped only to this repo with Contents: write permission
          # Set this secret at: Settings → Secrets and variables → Actions
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_PAT }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/comisai/comis/blob/main/CLA.md'
          branch: 'main'
          # Bots that should never be asked to sign
          allowlist: dependabot[bot],github-actions[bot],renovate[bot]
