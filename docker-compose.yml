# =============================================================================
# Comis Docker Compose — Production Configuration
# =============================================================================
# Usage:
#   cp .env.docker.example .env
#   # Edit .env with your configuration
#   docker compose up -d
#
# Services:
#   comis-daemon  — Core daemon (gateway, channels, agents, memory)
#   comis-web     — Web dashboard SPA (optional)
#   comis-cli     — Interactive CLI (one-shot, optional)
# =============================================================================

name: comis

services:
  # ---------------------------------------------------------------------------
  # Core Daemon — Gateway + Channels + Agents + Memory
  # ---------------------------------------------------------------------------
  comis-daemon:
    image: ${COMIS_IMAGE:-comis:local}
    container_name: comis-daemon
    init: true
    restart: unless-stopped

    ports:
      - "${COMIS_GATEWAY_HOST:-127.0.0.1}:${COMIS_GATEWAY_PORT:-4766}:4766"

    volumes:
      # Persistent data: SQLite DBs, logs, traces, secrets, workspace.
      # Mounted at /home/comis/.comis (the comis user's home/.comis) so the
      # daemon's two path-resolution mechanisms — config.dataDir / COMIS_DATA_DIR
      # *and* os.homedir() + "/.comis" — converge on the same host directory.
      # Mounting at /data instead used to silently split the daemon's data
      # across two paths inside the container (logs/workspace stayed
      # container-only at /home/comis/.comis while memory.db went to /data).
      - ${COMIS_DATA_DIR:-~/.comis}:/home/comis/.comis

      # Config files. Mounted read-write so the daemon can write its
      # config.last-good.yaml snapshot next to config.yaml — required
      # for the recovery path printed on bootstrap failure.
      - ${COMIS_CONFIG_DIR:-~/.comis}:/etc/comis

      # Optional: override the .env source path. Mounted read-write so the
      # daemon's env.set RPC (used by the agent's `gateway` env_set action,
      # `comis configure`, etc.) can persist new credentials in legacy mode.
      # If you point COMIS_ENV_FILE at an externally-managed file you don't
      # want the daemon to modify, change this to :ro yourself.
      #
      # PREREQUISITE: the source path MUST exist as a file before `up`.
      # Docker silently creates a directory at the host path otherwise,
      # which then fails every write. The repo's `docker-setup.sh` handles
      # this; if you bring up manually, run first:
      #     mkdir -p ~/.comis && touch ~/.comis/.env && chmod 600 ~/.comis/.env
      - ${COMIS_ENV_FILE:-~/.comis/.env}:/home/comis/.comis/.env

    environment:
      # Core configuration
      - NODE_ENV=production
      - COMIS_DATA_DIR=/home/comis/.comis
      - COMIS_CONFIG_PATHS=/etc/comis/config.yaml

      # Gateway binding — MUST be 0.0.0.0 inside container
      # for Docker port mapping to work
      - COMIS_GATEWAY_HOST=0.0.0.0
      - COMIS_GATEWAY_PORT=4766

      # Secrets — injected via env vars or .env file mount
      - SECRETS_MASTER_KEY=${SECRETS_MASTER_KEY:-}

      # LLM Provider Keys (pass-through from host .env)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}

      # Channel Tokens (pass-through from host .env)
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}

      # Gateway Auth
      - COMIS_GATEWAY_TOKEN=${COMIS_GATEWAY_TOKEN:-}

    # Allow bubblewrap (the agent exec sandbox) to create user namespaces.
    # Ubuntu 23.10+ hosts set kernel.apparmor_restrict_unprivileged_userns=1,
    # and Docker's default seccomp profile blocks the unshare(2) flags bwrap
    # needs. Without these opt-outs the in-container `bwrap` fails with
    # "setting up uid map: Permission denied" and the daemon falls back to
    # running agent-issued shell commands unsandboxed — which lets a
    # prompt-injected exec read /home/comis/.comis/.env,
    # /etc/comis/config.yaml, and the encrypted secrets store inside the
    # same container.
    security_opt:
      - apparmor=unconfined
      - seccomp=unconfined

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:4766/health"]
      interval: 60s
      timeout: 10s
      start_period: 30s
      retries: 3

    # Resource limits (adjust per deployment)
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
        reservations:
          memory: 256m
          cpus: "0.5"

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # Web Dashboard — Lit SPA served via Nginx (optional)
  # ---------------------------------------------------------------------------
  comis-web:
    image: ${COMIS_WEB_IMAGE:-comis-web:local}
    container_name: comis-web
    restart: unless-stopped
    profiles:
      - web  # Only starts with: docker compose --profile web up

    ports:
      - "${COMIS_WEB_HOST:-127.0.0.1}:${COMIS_WEB_PORT:-8080}:8080"

    depends_on:
      comis-daemon:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3

    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.5"

  # ---------------------------------------------------------------------------
  # CLI — Interactive administration (one-shot)
  # ---------------------------------------------------------------------------
  comis-cli:
    image: ${COMIS_IMAGE:-comis:local}
    container_name: comis-cli
    profiles:
      - cli  # Only starts with: docker compose --profile cli run ...

    # Share daemon's loopback so CLI can reach 127.0.0.1:4766
    network_mode: "service:comis-daemon"

    volumes:
      - ${COMIS_DATA_DIR:-~/.comis}:/home/comis/.comis
      - ${COMIS_CONFIG_DIR:-~/.comis}:/etc/comis

    environment:
      - NODE_ENV=production
      - COMIS_DATA_DIR=/home/comis/.comis
      - COMIS_CONFIG_PATHS=/etc/comis/config.yaml
      - COMIS_GATEWAY_TOKEN=${COMIS_GATEWAY_TOKEN:-}

    # Interactive mode
    stdin_open: true
    tty: true

    entrypoint: ["node", "packages/cli/dist/cli.js"]

    depends_on:
      comis-daemon:
        condition: service_healthy

    # Security hardening for CLI
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - NET_RAW
      - NET_ADMIN
