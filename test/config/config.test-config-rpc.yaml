# Comis Test Configuration -- Config RPC Validation Tests
#
# Port 8500 for config.read/config.schema/config.patch RPC validation.
# Includes non-default values in several sections to verify config.read returns actual values.

tenantId: "config-rpc-test"
logLevel: "debug"
dataDir: ""

agents:
  default:
    name: "ConfigTestAgent"
    model: default
    thinkingLevel: "off"
    provider: default
    maxSteps: 10
    budgets:
      perExecution: 500000
      perHour: 5000000
      perDay: 50000000
    circuitBreaker:
      failureThreshold: 100
      resetTimeoutMs: 1000
      halfOpenTimeoutMs: 500
    rag:
      enabled: false
    scheduler:
      cron:
        enabled: true
        maxConcurrentRuns: 5
        defaultTimezone: "UTC"

gateway:
  enabled: true
  host: "127.0.0.1"
  port: 8500
  tokens:
    - id: "test-token"
      secret: "test-secret-key-for-config-rpc-tests"
      scopes: ["rpc", "ws", "admin"]
  rateLimit:
    windowMs: 60000
    maxRequests: 10000
  maxBatchSize: 50
  wsHeartbeatMs: 30000

scheduler:
  cron:
    enabled: true
    maxConcurrentRuns: 5
    defaultTimezone: "UTC"
  heartbeat:
    intervalMs: 300000
    showOk: false
    showAlerts: true
  quietHours:
    enabled: false
    criticalBypass: true

memory:
  dbPath: "test-memory-config-rpc.db"

security:
  agentToAgent:
    enabled: true

monitoring:
  disk:
    enabled: false
  resources:
    enabled: false
  systemd:
    enabled: false
  securityUpdates:
    enabled: false
  git:
    enabled: false

models:
  defaultProvider: anthropic
