# Comis Test Configuration (Agent Identity)
#
# Variant of config.test-multi-agent.yaml with:
# - Two agents (primary with full tool profile, secondary with minimal profile)
# - Separate port (8508) to avoid conflicts with other test suites
# - Tests agent identity REST API, RPC config, and LLM integration

tenantId: "test"
logLevel: "debug"
dataDir: "" # Resolves to ~/.comis at runtime

agents:
  primary:
    name: "PrimaryIdentityAgent"
    model: default
    thinkingLevel: "off"
    provider: default
    maxSteps: 10
    budgets:
      perExecution: 500000
      perHour: 5000000
      perDay: 50000000
    circuitBreaker:
      failureThreshold: 100
      resetTimeoutMs: 1000
      halfOpenTimeoutMs: 500
    rag:
      enabled: false
    skills:
      toolPolicy:
        profile: "full"
        allow: []
        deny: []
    scheduler:
      cron:
        enabled: true
        maxConcurrentRuns: 5
        defaultTimezone: "UTC"
  secondary:
    name: "SecondaryIdentityAgent"
    model: default
    thinkingLevel: "off"
    provider: default
    maxSteps: 10
    budgets:
      perExecution: 500000
      perHour: 5000000
      perDay: 50000000
    circuitBreaker:
      failureThreshold: 100
      resetTimeoutMs: 1000
      halfOpenTimeoutMs: 500
    rag:
      enabled: false
    skills:
      toolPolicy:
        profile: "minimal"
        allow: []
        deny: []
    scheduler:
      cron:
        enabled: true
        maxConcurrentRuns: 5
        defaultTimezone: "UTC"

routing:
  defaultAgentId: "primary"
  bindings: []

gateway:
  enabled: true
  host: "127.0.0.1"
  port: 8508
  tokens:
    - id: "test-token"
      secret: "test-secret-key-for-integration-tests"
      scopes: ["rpc", "ws", "admin"]
  rateLimit:
    windowMs: 60000
    maxRequests: 10000
  maxBatchSize: 50
  wsHeartbeatMs: 30000

scheduler:
  cron:
    enabled: true
    maxConcurrentRuns: 5
    defaultTimezone: "UTC"
  heartbeat:
    intervalMs: 300000
    showOk: false
    showAlerts: true
  quietHours:
    enabled: false
    criticalBypass: true

memory:
  dbPath: "test-memory-identity.db"

security:
  agentToAgent:
    enabled: true

monitoring:
  disk:
    enabled: false
  resources:
    enabled: false
  systemd:
    enabled: false
  securityUpdates:
    enabled: false
  git:
    enabled: false
