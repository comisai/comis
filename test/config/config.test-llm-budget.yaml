# Comis Test Configuration: LLM Budget Enforcement
#
# Port 8483 -- unique to LLM budget tests
# Tight perExecution budget (100 tokens) triggers budget_exceeded on pre-check
# without making any real API call. The estimateCost function calculates
# contextChars / 3 + 4096 (maxOutput), so even an empty context estimates
# 4096 tokens which far exceeds 100.

tenantId: "test"
logLevel: "debug"
dataDir: "" # Resolves to ~/.comis at runtime

agents:
  default:
    name: "BudgetTestAgent"
    model: default
    thinkingLevel: "off"
    provider: default
    maxSteps: 3
    budgets:
      perExecution: 100 # Intentionally tiny -- triggers budget_exceeded on pre-check
      perHour: 5000000
      perDay: 50000000
    circuitBreaker:
      failureThreshold: 100
      resetTimeoutMs: 1000
      halfOpenTimeoutMs: 500
    rag:
      enabled: false

gateway:
  enabled: true
  host: "127.0.0.1"
  port: 8483
  tokens:
    - id: "test-token"
      secret: "test-secret-key-for-integration-tests"
      scopes: ["rpc", "ws", "admin"]
  rateLimit:
    windowMs: 60000
    maxRequests: 10000
  maxBatchSize: 50
  wsHeartbeatMs: 30000

memory:
  dbPath: "test-memory-llm-budget.db"

monitoring:
  disk:
    enabled: false
  resources:
    enabled: false
  systemd:
    enabled: false
  securityUpdates:
    enabled: false
  git:
    enabled: false
