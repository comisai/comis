# Comis Test Configuration — Gateway Rate Limit + Error Format Tests
#
# Uses port 8519 to avoid conflicts when running in parallel via vitest pool: "forks".
# High maxRequests (10000) because the daemon is used for JSON-RPC error format tests,
# NOT rate limit boundary tests (those use package-level app.request()).
# Two tokens with different scopes to test GW-09 insufficient scope error.

tenantId: "test"
logLevel: "debug"
dataDir: "" # Resolves to ~/.comis at runtime

agents:
  default:
    name: "TestAgent"
    model: default
    thinkingLevel: "off"
    provider: default
    maxSteps: 10
    budgets:
      perExecution: 500000
      perHour: 5000000
      perDay: 50000000
    circuitBreaker:
      failureThreshold: 100
      resetTimeoutMs: 1000
      halfOpenTimeoutMs: 500
    rag:
      enabled: false
    scheduler:
      cron:
        enabled: true
        maxConcurrentRuns: 5
        defaultTimezone: "UTC"

gateway:
  enabled: true
  host: "127.0.0.1"
  port: 8519
  tokens:
    - id: "client-admin"
      secret: "admin-secret-key-for-ratelimit-tests"
      scopes: ["rpc", "ws", "admin"]
    - id: "client-rpc-only"
      secret: "rpc-only-secret-key-for-ratelimit-tests"
      scopes: ["rpc", "ws"]
  rateLimit:
    windowMs: 60000
    maxRequests: 10000
  maxBatchSize: 3
  wsHeartbeatMs: 30000

scheduler:
  cron:
    enabled: true
    maxConcurrentRuns: 5
    defaultTimezone: "UTC"
  heartbeat:
    intervalMs: 300000
    showOk: false
    showAlerts: true
  quietHours:
    enabled: false
    criticalBypass: true

memory:
  dbPath: "test-memory-gateway-ratelimit.db"

security:
  agentToAgent:
    enabled: true

monitoring:
  disk:
    enabled: false
  resources:
    enabled: false
  systemd:
    enabled: false
  securityUpdates:
    enabled: false
  git:
    enabled: false
