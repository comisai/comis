# Comis Test Configuration (v13.0 Structural Non-LLM Tests)
#
# Validates v13.0 Agent Intelligence features at the daemon level:
# - reactionLevel config propagation (Phase 176)
# - Daemon bootstrap with all v13.0 config fields
# - No LLM API keys required
#
# Port 8550 (unique to this test suite)
# Memory database: test-memory-180-v13-structural.db

tenantId: "test"
logLevel: "debug"
dataDir: "" # Resolves to ~/.comis at runtime

agents:
  default:
    name: "V13StructuralAgent"
    model: default
    thinkingLevel: "off"
    provider: default
    maxSteps: 10
    reactionLevel: "minimal"
    budgets:
      perExecution: 500000
      perHour: 5000000
      perDay: 50000000
    circuitBreaker:
      failureThreshold: 100
      resetTimeoutMs: 1000
      halfOpenTimeoutMs: 500
    rag:
      enabled: false
    scheduler:
      cron:
        enabled: false

gateway:
  enabled: true
  host: "127.0.0.1"
  port: 8550
  tokens:
    - id: "test-token"
      secret: "test-secret-key-for-integration-tests"
      scopes: ["rpc", "ws", "admin"]
  rateLimit:
    windowMs: 60000
    maxRequests: 10000
  maxBatchSize: 50
  wsHeartbeatMs: 30000

scheduler:
  cron:
    enabled: false
  heartbeat:
    intervalMs: 300000
    showOk: false
    showAlerts: true
  quietHours:
    enabled: false
    criticalBypass: true

memory:
  dbPath: "test-memory-180-v13-structural.db"

security:
  agentToAgent:
    enabled: true

monitoring:
  disk:
    enabled: false
  resources:
    enabled: false
  systemd:
    enabled: false
  securityUpdates:
    enabled: false
  git:
    enabled: false
