# Comis Test Configuration
#
# Designed for integration testing with:
# - Debug logging for maximum visibility
# - Relaxed budgets and circuit breaker thresholds
# - High rate limits to avoid test throttling
# - All monitoring sources disabled
# - Gateway enabled with bearer token auth (no TLS for tests)
# - Cron scheduling enabled
# - RAG disabled (no embeddings needed for basic tests)

tenantId: "test"
logLevel: "debug"
dataDir: "" # Resolves to ~/.comis at runtime

agents:
  default:
    name: "TestAgent"
    model: default
    provider: default
    maxSteps: 10
    budgets:
      perExecution: 500000
      perHour: 5000000
      perDay: 50000000
    circuitBreaker:
      failureThreshold: 100
      resetTimeoutMs: 1000
      halfOpenTimeoutMs: 500
    rag:
      enabled: false
    scheduler:
      cron:
        enabled: true
        maxConcurrentRuns: 5
        defaultTimezone: "UTC"

gateway:
  enabled: true
  host: "127.0.0.1"
  port: 4766
  tokens:
    - id: "test-token"
      secret: "test-secret-key-for-integration-tests"
      scopes: ["rpc", "ws", "admin"]
  rateLimit:
    windowMs: 60000
    maxRequests: 10000
  maxBatchSize: 50
  wsHeartbeatMs: 30000

scheduler:
  cron:
    enabled: true
    maxConcurrentRuns: 5
    defaultTimezone: "UTC"
  heartbeat:
    intervalMs: 300000
    showOk: false
    showAlerts: true
  quietHours:
    enabled: false
    criticalBypass: true

memory:
  dbPath: "test-memory-default.db"

security:
  agentToAgent:
    enabled: true

monitoring:
  disk:
    enabled: false
  resources:
    enabled: false
  systemd:
    enabled: false
  securityUpdates:
    enabled: false
  git:
    enabled: false

models:
  defaultProvider: anthropic
