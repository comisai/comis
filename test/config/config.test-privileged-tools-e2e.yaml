tenantId: test
logLevel: debug
dataDir: ""
agents:
  default:
    name: TestAgent
    model: claude-opus-4-6
    thinkingLevel: off
    provider: anthropic
    maxSteps: 10
    budgets:
      perExecution: 500000
      perHour: 5000000
      perDay: 50000000
    circuitBreaker:
      failureThreshold: 100
      resetTimeoutMs: 1000
      halfOpenTimeoutMs: 500
    rag:
      enabled: false
    scheduler:
      cron:
        enabled: false
  helper:
    name: HelperAgent
    model: claude-opus-4-6
    thinkingLevel: off
    provider: anthropic
    maxSteps: 5
    budgets:
      perExecution: 500000
      perHour: 5000000
      perDay: 50000000
    circuitBreaker:
      failureThreshold: 100
      resetTimeoutMs: 1000
      halfOpenTimeoutMs: 500
    rag:
      enabled: false
gateway:
  enabled: true
  host: 127.0.0.1
  port: 8523
  tokens:
    - id: test-token
      secret: test-secret-key-for-privileged-tools-e2e
      scopes:
        - rpc
        - ws
        - admin
  rateLimit:
    windowMs: 60000
    maxRequests: 10000
  maxBatchSize: 50
  wsHeartbeatMs: 30000
approvals:
  enabled: true
  defaultTimeoutMs: 5000
scheduler:
  cron:
    enabled: false
  heartbeat:
    intervalMs: 300000
    showOk: false
    showAlerts: true
  quietHours:
    enabled: false
    criticalBypass: true
memory:
  dbPath: test-memory-privileged-tools-e2e.db
security:
  agentToAgent:
    enabled: false
monitoring:
  disk:
    enabled: false
  resources:
    enabled: false
  systemd:
    enabled: false
  securityUpdates:
    enabled: false
  git:
    enabled: false
models:
  defaultProvider: anthropic
