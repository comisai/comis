# Comis Test Configuration (Agents Search)
#
# Dedicated config for hybrid search integration tests.
# Port 8509 to avoid conflicts with existing test suites.
# Separate memory database (test-memory-agents-search.db) for data isolation.
# RAG enabled with minScore 0.0 for maximum search sensitivity.

tenantId: "default"
logLevel: "debug"
dataDir: "" # Resolves to ~/.comis at runtime

agents:
  default:
    name: "SearchTestAgent"
    model: default
    thinkingLevel: "off"
    provider: default
    maxSteps: 10
    budgets:
      perExecution: 500000
      perHour: 5000000
      perDay: 50000000
    circuitBreaker:
      failureThreshold: 100
      resetTimeoutMs: 1000
      halfOpenTimeoutMs: 500
    rag:
      enabled: true
      maxResults: 5
      minScore: 0.0
      maxContextChars: 4000
      includeTrustLevels: ["system", "learned", "external"]

gateway:
  enabled: true
  host: "127.0.0.1"
  port: 8509
  tokens:
    - id: "test-token"
      secret: "test-secret-key-for-integration-tests"
      scopes: ["rpc", "ws", "admin"]
  rateLimit:
    windowMs: 60000
    maxRequests: 10000
  maxBatchSize: 50
  wsHeartbeatMs: 30000

memory:
  dbPath: "test-memory-agents-search.db"

security:
  agentToAgent:
    enabled: true

monitoring:
  disk:
    enabled: false
  resources:
    enabled: false
  systemd:
    enabled: false
  securityUpdates:
    enabled: false
  git:
    enabled: false
