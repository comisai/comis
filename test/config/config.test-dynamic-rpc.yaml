# Comis Test Configuration — Dynamic RPC Method Tests
#
# Shared by:
#   - Plan 01: obs.* namespace E2E endpoint validation
#   - Plan 02: scope enforcement, batch RPC, error handling edge cases
#
# Port 8492 — next available after 8491 (ws-discovery)
#
# Dual tokens:
#   - admin-token:    scopes ["rpc", "ws", "admin"] — full access to all methods
#   - rpc-only-token: scopes ["rpc", "ws"]          — no admin access (used for scope enforcement tests)

tenantId: "test"
logLevel: "debug"
dataDir: "" # Resolves to ~/.comis at runtime

agents:
  default:
    name: "TestAgent"
    model: default
    thinkingLevel: "off"
    provider: default
    maxSteps: 10
    budgets:
      perExecution: 500000
      perHour: 5000000
      perDay: 50000000
    circuitBreaker:
      failureThreshold: 100
      resetTimeoutMs: 1000
      halfOpenTimeoutMs: 500
    rag:
      enabled: false
    scheduler:
      cron:
        enabled: true
        maxConcurrentRuns: 5
        defaultTimezone: "UTC"

gateway:
  enabled: true
  host: "127.0.0.1"
  port: 8492
  tokens:
    - id: "admin-token"
      secret: "admin-secret-for-dynamic-rpc-tests"
      scopes: ["rpc", "ws", "admin"]
    - id: "rpc-only-token"
      secret: "rpc-secret-for-dynamic-rpc-tests"
      scopes: ["rpc", "ws"]
  rateLimit:
    windowMs: 60000
    maxRequests: 10000
  maxBatchSize: 50
  wsHeartbeatMs: 30000

scheduler:
  cron:
    enabled: true
    maxConcurrentRuns: 5
    defaultTimezone: "UTC"
  heartbeat:
    intervalMs: 300000
    showOk: false
    showAlerts: true
  quietHours:
    enabled: false
    criticalBypass: true

memory:
  dbPath: "test-memory-dynamic-rpc.db"

security:
  agentToAgent:
    enabled: true

monitoring:
  disk:
    enabled: false
  resources:
    enabled: false
  systemd:
    enabled: false
  securityUpdates:
    enabled: false
  git:
    enabled: false
