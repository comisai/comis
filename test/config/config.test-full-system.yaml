# Comis Test Configuration (Full-System Integration)
#
# All-subsystems daemon config for Phase 114 full-system E2E workflow tests.
# Enables every subsystem simultaneously: LLM, tools (full profile), RAG,
# embeddings, scheduler (cron), memory, link understanding, agent-to-agent.
#
# Port 8494 -- next available after 8493 (agent-tools-platform)
# Memory DB: test-memory-full-system.db (unique to avoid data contamination)

tenantId: "test"
logLevel: "debug"
dataDir: ""

agents:
  default:
    name: "FullSystemTestAgent"
    model: default
    thinkingLevel: "off"
    provider: default
    maxSteps: 15
    budgets:
      perExecution: 500000
      perHour: 5000000
      perDay: 50000000
    circuitBreaker:
      failureThreshold: 100
      resetTimeoutMs: 1000
      halfOpenTimeoutMs: 500
    rag:
      enabled: true
      maxResults: 5
      minScore: 0.0
      maxContextChars: 4000
      includeTrustLevels: ["system", "learned", "external"]
    skills:
      toolPolicy:
        profile: "full"
        allow: []
        deny: []
    scheduler:
      cron:
        enabled: true
        maxConcurrentRuns: 5
        defaultTimezone: "UTC"

gateway:
  enabled: true
  host: "127.0.0.1"
  port: 8494
  tokens:
    - id: "test-token"
      secret: "test-secret-key-for-integration-tests"
      scopes: ["rpc", "ws", "admin"]
  rateLimit:
    windowMs: 60000
    maxRequests: 10000
  maxBatchSize: 50
  wsHeartbeatMs: 30000

embedding:
  enabled: true
  provider: "openai"
  openai:
    model: "text-embedding-3-small"
    dimensions: 256
  cache:
    maxEntries: 100

scheduler:
  cron:
    enabled: true
    maxConcurrentRuns: 5
    defaultTimezone: "UTC"
  heartbeat:
    intervalMs: 300000
    showOk: false
    showAlerts: true
  quietHours:
    enabled: false
    criticalBypass: true

memory:
  dbPath: "test-memory-full-system.db"

security:
  agentToAgent:
    enabled: true

monitoring:
  disk:
    enabled: false
  resources:
    enabled: false
  systemd:
    enabled: false
  securityUpdates:
    enabled: false
  git:
    enabled: false

integrations:
  media:
    linkUnderstanding:
      enabled: true
      maxLinks: 3
      fetchTimeoutMs: 15000
      maxContentChars: 5000
