# Comis Test Configuration (Scheduler Execution Tests)
#
# Variant of config.test.yaml with:
# - Separate port (8448) to avoid conflicts with other test suites (4766-8447)
# - Separate memory database (test-memory-31-exec.db) to avoid data contamination
# - Cron scheduling enabled for per-agent CronScheduler initialization
# - Disk monitoring enabled (threshold 99%) to ensure HeartbeatRunner is created
# - RAG disabled (no embeddings needed for scheduler tests)

tenantId: "test"
logLevel: "debug"
dataDir: "" # Resolves to ~/.comis at runtime

agents:
  default:
    name: "TestAgent"
    model: default
    thinkingLevel: "off"
    provider: default
    maxSteps: 10
    budgets:
      perExecution: 500000
      perHour: 5000000
      perDay: 50000000
    circuitBreaker:
      failureThreshold: 100
      resetTimeoutMs: 1000
      halfOpenTimeoutMs: 500
    rag:
      enabled: false
    scheduler:
      cron:
        enabled: true
        maxConcurrentRuns: 5
        defaultTimezone: "UTC"

gateway:
  enabled: true
  host: "127.0.0.1"
  port: 8448
  tokens:
    - id: "test-token"
      secret: "test-secret-key-for-integration-tests"
      scopes: ["rpc", "ws", "admin"]
  rateLimit:
    windowMs: 60000
    maxRequests: 10000
  maxBatchSize: 50
  wsHeartbeatMs: 30000

scheduler:
  cron:
    enabled: true
    maxConcurrentRuns: 5
    defaultTimezone: "UTC"
  heartbeat:
    intervalMs: 300000
    showOk: false
    showAlerts: true
  quietHours:
    enabled: false
    criticalBypass: true

memory:
  dbPath: "test-memory-31-exec.db"

security:
  agentToAgent:
    enabled: true

monitoring:
  disk:
    enabled: true
    paths: ["/"]
    thresholdPercent: 99
  resources:
    enabled: false
  systemd:
    enabled: false
  securityUpdates:
    enabled: false
  git:
    enabled: false
