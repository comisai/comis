# Comis Test Configuration (v13.0 LLM-Gated Session Greeting Tests)
#
# Port 8551 -- unique to v13.0 LLM-gated session greeting and agent execution tests.
# Tests /new and /reset greeting generation with the v13.0 enriched system prompt,
# and validates agent.execute succeeds with all v13.0 prompt enrichments
# (CTXT-01, CTXT-02, AGNT-05, COMM-04).
# Requires ANTHROPIC_API_KEY or OPENAI_API_KEY in ~/.comis/.env.

tenantId: "test"
logLevel: "debug"
dataDir: ""

agents:
  default:
    name: "V13GreetingAgent"
    model: default
    thinkingLevel: "off"
    provider: default
    maxSteps: 10
    reactionLevel: "minimal"
    budgets:
      perExecution: 500000
      perHour: 5000000
      perDay: 50000000
    circuitBreaker:
      failureThreshold: 100
      resetTimeoutMs: 1000
      halfOpenTimeoutMs: 500
    rag:
      enabled: false
    scheduler:
      cron:
        enabled: false

gateway:
  enabled: true
  host: "127.0.0.1"
  port: 8551
  tokens:
    - id: "test-token"
      secret: "test-secret-key-for-integration-tests"
      scopes: ["rpc", "ws", "admin"]
  rateLimit:
    windowMs: 60000
    maxRequests: 10000
  maxBatchSize: 50
  wsHeartbeatMs: 30000

scheduler:
  cron:
    enabled: false
  heartbeat:
    intervalMs: 300000
    showOk: false
    showAlerts: true
  quietHours:
    enabled: false
    criticalBypass: true

memory:
  dbPath: "test-memory-180-v13-greeting.db"

security:
  agentToAgent:
    enabled: true

monitoring:
  disk:
    enabled: false
  resources:
    enabled: false
  systemd:
    enabled: false
  securityUpdates:
    enabled: false
  git:
    enabled: false
