# Comis Test Configuration — Webhook Delivery + SSE Advanced Tests
#
# Uses port 8490 to avoid conflicts when running in parallel via vitest pool: "forks".
# Webhooks enabled with HMAC token for E2E webhook delivery testing.

tenantId: "test"
logLevel: "debug"
dataDir: "" # Resolves to ~/.comis at runtime

agents:
  default:
    name: "TestAgent"
    model: default
    thinkingLevel: "off"
    provider: default
    maxSteps: 5
    budgets:
      perExecution: 500000
      perHour: 5000000
      perDay: 50000000
    circuitBreaker:
      failureThreshold: 100
      resetTimeoutMs: 1000
      halfOpenTimeoutMs: 500
    rag:
      enabled: false

gateway:
  enabled: true
  host: "127.0.0.1"
  port: 8490
  tokens:
    - id: "test-token"
      secret: "test-secret-key-for-webhook-sse-a"
      scopes: ["rpc", "ws", "admin"]
  rateLimit:
    windowMs: 60000
    maxRequests: 10000
  maxBatchSize: 50
  wsHeartbeatMs: 30000

webhooks:
  enabled: true
  path: "/hooks"
  token: "test-webhook-secret-for-e2e-pad32"
  presets: []
  mappings:
    - id: "wake-test"
      match:
        path: "wake"
      action: "wake"
      wakeMode: "now"

memory:
  dbPath: "test-memory-webhook-sse.db"

security:
  agentToAgent:
    enabled: true

monitoring:
  disk:
    enabled: false
  resources:
    enabled: false
  systemd:
    enabled: false
  securityUpdates:
    enabled: false
  git:
    enabled: false

models:
  defaultProvider: anthropic
