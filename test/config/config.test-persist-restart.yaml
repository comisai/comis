# Comis Test Configuration -- Persist Restart Survival E2E Tests
#
# Port 8602 for daemon restart survival E2E validation.
# Tests verify that management actions persisted to config.yaml survive
# a daemon restart cycle: RPC call -> persist -> shutdown -> restart -> verify.

tenantId: "persist-restart-test"
logLevel: "debug"
dataDir: ""

agents:
  default:
    name: "RestartTestAgent"
    model: default
    thinkingLevel: "off"
    provider: default
    maxSteps: 10
    budgets:
      perExecution: 500000
      perHour: 5000000
      perDay: 50000000
    circuitBreaker:
      failureThreshold: 100
      resetTimeoutMs: 1000
      halfOpenTimeoutMs: 500
    rag:
      enabled: false

gateway:
  enabled: true
  host: "127.0.0.1"
  port: 8602
  tokens:
    - id: "restart-token"
      secret: "test-secret-persist-restart-pad32"
      scopes: ["rpc", "ws", "admin"]
  rateLimit:
    windowMs: 60000
    maxRequests: 10000
  maxBatchSize: 50
  wsHeartbeatMs: 30000

channels:
  telegram:
    enabled: true

scheduler:
  cron:
    enabled: true
    maxConcurrentRuns: 5
    defaultTimezone: "UTC"
  heartbeat:
    intervalMs: 300000
    showOk: false
    showAlerts: true
  quietHours:
    enabled: false
    criticalBypass: true

memory:
  dbPath: "test-memory-persist-restart.db"

security:
  agentToAgent:
    enabled: true

monitoring:
  disk:
    enabled: false
  resources:
    enabled: false
  systemd:
    enabled: false
  securityUpdates:
    enabled: false
  git:
    enabled: false

models:
  defaultProvider: anthropic
