# Comis Test Configuration (Full-System Multi-Agent)
#
# Port 8495 -- unique to multi-agent full-system E2E integration tests
# Two agents (alpha, beta) BOTH with full tool profiles, RAG, embeddings,
# scheduler, and agent-to-agent messaging enabled.
#
# Tests cross-agent subsystem integration:
#   FSM-01: Two agents execute independently with all subsystems active
#   FSM-02: Agent-to-agent messaging via session.send
#   FSM-03: Agent memory isolation across agents (RAG + embeddings)

tenantId: "test"
logLevel: "debug"
dataDir: ""

agents:
  alpha:
    name: "AlphaAgent"
    model: default
    thinkingLevel: "off"
    provider: default
    maxSteps: 15
    budgets:
      perExecution: 500000
      perHour: 5000000
      perDay: 50000000
    circuitBreaker:
      failureThreshold: 100
      resetTimeoutMs: 1000
      halfOpenTimeoutMs: 500
    rag:
      enabled: true
      maxResults: 5
      minScore: 0.0
      maxContextChars: 4000
      includeTrustLevels: ["system", "learned", "external"]
    skills:
      toolPolicy:
        profile: "full"
        allow: []
        deny: []
    scheduler:
      cron:
        enabled: true
        maxConcurrentRuns: 5
        defaultTimezone: "UTC"
  beta:
    name: "BetaAgent"
    model: default
    thinkingLevel: "off"
    provider: default
    maxSteps: 15
    budgets:
      perExecution: 500000
      perHour: 5000000
      perDay: 50000000
    circuitBreaker:
      failureThreshold: 100
      resetTimeoutMs: 1000
      halfOpenTimeoutMs: 500
    rag:
      enabled: true
      maxResults: 5
      minScore: 0.0
      maxContextChars: 4000
      includeTrustLevels: ["system", "learned", "external"]
    skills:
      toolPolicy:
        profile: "full"
        allow: []
        deny: []
    scheduler:
      cron:
        enabled: true
        maxConcurrentRuns: 5
        defaultTimezone: "UTC"

gateway:
  enabled: true
  host: "127.0.0.1"
  port: 8495
  tokens:
    - id: "test-token"
      secret: "test-secret-key-for-integration-tests"
      scopes: ["rpc", "ws", "admin"]
  rateLimit:
    windowMs: 60000
    maxRequests: 10000
  maxBatchSize: 50
  wsHeartbeatMs: 30000

embedding:
  enabled: true
  provider: "openai"
  openai:
    model: "text-embedding-3-small"
    dimensions: 256
  cache:
    maxEntries: 100

scheduler:
  cron:
    enabled: true
    maxConcurrentRuns: 5
    defaultTimezone: "UTC"
  heartbeat:
    intervalMs: 300000
    showOk: false
    showAlerts: true
  quietHours:
    enabled: false
    criticalBypass: true

memory:
  dbPath: "test-memory-full-system-multiagent.db"

security:
  agentToAgent:
    enabled: true

integrations:
  media:
    linkUnderstanding:
      enabled: true
      maxLinks: 3
      fetchTimeoutMs: 15000
      maxContentChars: 5000

monitoring:
  disk:
    enabled: false
  resources:
    enabled: false
  systemd:
    enabled: false
  securityUpdates:
    enabled: false
  git:
    enabled: false
