# EventBus Daemon E2E Tests -- port 8503
#
# Uses port 8503 to avoid conflicts when running in parallel via vitest pool: "forks".

tenantId: "test"
logLevel: "debug"
dataDir: "" # Resolves to ~/.comis at runtime

agents:
  test-agent:
    model: default
    thinkingLevel: "off"
    name: EventBus Test Agent
    provider: default
    maxSteps: 5
    budgets:
      perExecution: 500000
      perHour: 5000000
      perDay: 50000000
    circuitBreaker:
      failureThreshold: 100
      resetTimeoutMs: 1000
      halfOpenTimeoutMs: 500
    rag:
      enabled: false
    scheduler:
      cron:
        enabled: true
        maxConcurrentRuns: 5
        defaultTimezone: "UTC"

memory:
  dbPath: "test-memory-eventbus-e2e.db"
  walMode: true

gateway:
  enabled: true
  host: "127.0.0.1"
  port: 8503
  tokens:
    - id: test-token
      secret: eventbus-test-secret-token-abc123
      scopes: ["rpc", "ws", "admin", "sse"]
  rateLimit:
    windowMs: 60000
    maxRequests: 10000
  maxBatchSize: 50
  wsHeartbeatMs: 30000

scheduler:
  cron:
    enabled: true
    maxConcurrentRuns: 5
    defaultTimezone: "UTC"
  heartbeat:
    intervalMs: 300000
    showOk: false
    showAlerts: true
  quietHours:
    enabled: false
    criticalBypass: true

security:
  agentToAgent:
    enabled: true

monitoring:
  disk:
    enabled: false
  resources:
    enabled: false
  systemd:
    enabled: false
  securityUpdates:
    enabled: false
  git:
    enabled: false

models:
  defaultProvider: anthropic
