# Comis Test Configuration (RAG Comprehensive E2E)
#
# Dedicated RAG test config for Phase 131 comprehensive E2E tests.
# Enables RAG with FTS5 text search and OpenAI embeddings (vector search).
#
# Port 8511 -- next available after 8510 (8505 claimed by sessions-lifecycle)
# Memory DB: test-memory-rag-comprehensive.db (unique to avoid data contamination)

tenantId: "default"
logLevel: "debug"
dataDir: ""

agents:
  default:
    name: "RagTestAgent"
    model: default
    thinkingLevel: "off"
    provider: default
    maxSteps: 10
    budgets:
      perExecution: 500000
      perHour: 5000000
      perDay: 50000000
    circuitBreaker:
      failureThreshold: 100
      resetTimeoutMs: 1000
      halfOpenTimeoutMs: 500
    rag:
      enabled: true
      maxResults: 5
      minScore: 0.0
      maxContextChars: 4000
      includeTrustLevels: ["system", "learned", "external"]

gateway:
  enabled: true
  host: "127.0.0.1"
  port: 8511
  tokens:
    - id: "test-token"
      secret: "test-secret-key-for-integration-tests"
      scopes: ["rpc", "ws", "admin"]
  rateLimit:
    windowMs: 60000
    maxRequests: 10000
  maxBatchSize: 50
  wsHeartbeatMs: 30000

embedding:
  enabled: true
  provider: "openai"
  openai:
    model: "text-embedding-3-small"
    dimensions: 256
  cache:
    maxEntries: 100

memory:
  dbPath: "test-memory-rag-comprehensive.db"

security:
  agentToAgent:
    enabled: true

monitoring:
  disk:
    enabled: false
  resources:
    enabled: false
  systemd:
    enabled: false
  securityUpdates:
    enabled: false
  git:
    enabled: false
