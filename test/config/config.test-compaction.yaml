# Comis Test Configuration (Compaction Pipeline E2E)
#
# Low maxContextChars (3000) and low threshold ratios (0.50/0.70) to trigger
# compaction within a few messages. Port 8516 unique to this suite.
# Memory DB: test-memory-130-compaction.db

tenantId: "test"
logLevel: "debug"
dataDir: ""

agents:
  default:
    name: "CompactionTestAgent"
    model: default
    thinkingLevel: "off"
    provider: default
    maxSteps: 10
    maxContextChars: 3000
    preserveRecent: 4
    budgets:
      perExecution: 500000
      perHour: 5000000
      perDay: 50000000
    circuitBreaker:
      failureThreshold: 100
      resetTimeoutMs: 1000
      halfOpenTimeoutMs: 500
    rag:
      enabled: false
    session:
      compaction:
        softThresholdRatio: 0.50
        hardThresholdRatio: 0.70
        flushModel: "gpt-4o-mini"
    scheduler:
      cron:
        enabled: false

gateway:
  enabled: true
  host: "127.0.0.1"
  port: 8516
  tokens:
    - id: "test-token"
      secret: "test-secret-key-for-integration-tests"
      scopes: ["rpc", "ws", "admin"]
  rateLimit:
    windowMs: 60000
    maxRequests: 10000
  maxBatchSize: 50
  wsHeartbeatMs: 30000

scheduler:
  cron:
    enabled: false
  heartbeat:
    intervalMs: 300000
    showOk: false
    showAlerts: true
  quietHours:
    enabled: false
    criticalBypass: true

memory:
  dbPath: "test-memory-130-compaction.db"

monitoring:
  disk:
    enabled: false
  resources:
    enabled: false
  systemd:
    enabled: false
  securityUpdates:
    enabled: false
  git:
    enabled: false
