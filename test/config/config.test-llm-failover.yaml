# Comis Test Configuration: LLM Model Failover
#
# Port 8484 -- unique to LLM failover tests
# Uses intentionally invalid model ID "nonexistent-model-xyz-12345".
# The executor's getModel() call will throw, hitting the catch block
# which reads from config.modelFailover.fallbackModels and falls back
# to the first configured model (anthropic/claude-sonnet-4-5-20250929).
#
# The failover is config-driven via modelFailover.fallbackModels in the
# agent config, not hardcoded in agent-executor.ts.

tenantId: "test"
logLevel: "debug"
dataDir: "" # Resolves to ~/.comis at runtime

agents:
  default:
    name: "FailoverTestAgent"
    model: default # Intentionally invalid
    thinkingLevel: "off"
    provider: default
    maxSteps: 5
    modelFailover:
      fallbackModels:
        - provider: default
          modelId: "claude-sonnet-4-5-20250929"
    budgets:
      perExecution: 500000
      perHour: 5000000
      perDay: 50000000
    circuitBreaker:
      failureThreshold: 100
      resetTimeoutMs: 1000
      halfOpenTimeoutMs: 500
    rag:
      enabled: false
    skills:
      toolPolicy:
        profile: "minimal"

gateway:
  enabled: true
  host: "127.0.0.1"
  port: 8484
  tokens:
    - id: "test-token"
      secret: "test-secret-key-for-integration-tests"
      scopes: ["rpc", "ws", "admin"]
  rateLimit:
    windowMs: 60000
    maxRequests: 10000
  maxBatchSize: 50
  wsHeartbeatMs: 30000

memory:
  dbPath: "test-memory-llm-failover.db"

monitoring:
  disk:
    enabled: false
  resources:
    enabled: false
  systemd:
    enabled: false
  securityUpdates:
    enabled: false
  git:
    enabled: false
