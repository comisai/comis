# Comis Test Configuration (Sessions Lifecycle Non-LLM Tests)
#
# Variant of config.test-sessions.yaml with:
# - Separate port (8505) to avoid conflicts with other test suites
# - Separate memory database (test-memory-129-sessions-lifecycle.db)
# - RAG disabled (no embeddings needed)
# - Cron disabled (not testing scheduler)
# - All monitoring disabled
# - security.agentToAgent.enabled: true (required for session.send/spawn policy checks)

tenantId: "test"
logLevel: "debug"
dataDir: "" # Resolves to ~/.comis at runtime

agents:
  default:
    name: "TestAgent"
    model: claude-opus-4-6
    thinkingLevel: "off"
    provider: anthropic
    maxSteps: 10
    budgets:
      perExecution: 500000
      perHour: 5000000
      perDay: 50000000
    circuitBreaker:
      failureThreshold: 100
      resetTimeoutMs: 1000
      halfOpenTimeoutMs: 500
    rag:
      enabled: false
    scheduler:
      cron:
        enabled: false

gateway:
  enabled: true
  host: "127.0.0.1"
  port: 8505
  tokens:
    - id: "test-token"
      secret: "test-secret-key-for-integration-tests"
      scopes: ["rpc", "ws", "admin"]
  rateLimit:
    windowMs: 60000
    maxRequests: 10000
  maxBatchSize: 50
  wsHeartbeatMs: 30000

scheduler:
  cron:
    enabled: false
  heartbeat:
    intervalMs: 300000
    showOk: false
    showAlerts: true
  quietHours:
    enabled: false
    criticalBypass: true

memory:
  dbPath: "test-memory-129-sessions-lifecycle.db"

security:
  agentToAgent:
    enabled: true

monitoring:
  disk:
    enabled: false
  resources:
    enabled: false
  systemd:
    enabled: false
  securityUpdates:
    enabled: false
  git:
    enabled: false

models:
  defaultProvider: anthropic
