# Comis Test Configuration (Agent Routing E2E with Real LLM)
# Port 8514 -- real LLM multi-agent routing E2E tests
# 2 agents with distinct names to verify identity in LLM responses

tenantId: "test"
logLevel: "debug"
dataDir: ""

agents:
  route-primary:
    name: "PrimaryRoutingAgent"
    model: default
    thinkingLevel: "off"
    provider: default
    maxSteps: 5
    budgets:
      perExecution: 500000
      perHour: 5000000
      perDay: 50000000
    circuitBreaker:
      failureThreshold: 100
      resetTimeoutMs: 1000
      halfOpenTimeoutMs: 500
    rag:
      enabled: false
    skills:
      toolPolicy:
        profile: "minimal"
        allow: []
        deny: []
  route-secondary:
    name: "SecondaryRoutingAgent"
    model: default
    thinkingLevel: "off"
    provider: default
    maxSteps: 5
    budgets:
      perExecution: 500000
      perHour: 5000000
      perDay: 50000000
    circuitBreaker:
      failureThreshold: 100
      resetTimeoutMs: 1000
      halfOpenTimeoutMs: 500
    rag:
      enabled: false
    skills:
      toolPolicy:
        profile: "minimal"
        allow: []
        deny: []

routing:
  defaultAgentId: "route-primary"
  bindings:
    - channelType: "discord"
      agentId: "route-secondary"

gateway:
  enabled: true
  host: "127.0.0.1"
  port: 8514
  tokens:
    - id: "test-token"
      secret: "test-secret-key-for-integration-tests"
      scopes: ["rpc", "ws", "admin"]
  rateLimit:
    windowMs: 60000
    maxRequests: 10000
  maxBatchSize: 50
  wsHeartbeatMs: 30000

scheduler:
  cron:
    enabled: false
  heartbeat:
    intervalMs: 300000
    showOk: false
    showAlerts: true
  quietHours:
    enabled: false
    criticalBypass: true

memory:
  dbPath: "test-memory-agent-routing-e2e.db"

monitoring:
  disk:
    enabled: false
  resources:
    enabled: false
  systemd:
    enabled: false
  securityUpdates:
    enabled: false
  git:
    enabled: false
