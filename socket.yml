version: 2

githubApp:
  enabled: true
  pullRequestAlertsEnabled: true
  dependencyOverviewEnabled: true

issueRules:
  # Block PRs that introduce known-malicious or critical-risk packages
  malware: true
  highRiskNetwork: true
  highRiskEval: true
  protestware: true
  shellAccess: true
  filesystemAccess: true
  installScripts: true

  # Warn on medium-risk signals (don't block)
  obfuscatedCode: warn
  suspiciousString: warn
  deprecatedException: warn
  unmaintained: warn
  noLicense: warn
  unstableOwnership: warn
